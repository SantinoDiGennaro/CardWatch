<form [formGroup]="form" class="searchForm">
  <mat-form-field>
    <mat-label>Nome carta</mat-label>
    <input type="text"
           placeholder="Cerca..."
           matInput
           formControlName="search"
           [matAutocomplete]="auto">
    <mat-autocomplete #auto="matAutocomplete">
      @for (res of results; track res) {
        <mat-option [value]="res">{{res}}</mat-option>
      }
    </mat-autocomplete>
  </mat-form-field>

  <span>
    <button mat-raised-button (click)="searchCard()" [disabled]="isInvalid">
      Cerca
      <mat-icon>search</mat-icon>
    </button>
    <button mat-raised-button (click)="setFavoriteCards()" [disabled]="isInvalid">
      Salva
      <mat-icon>star</mat-icon>
    </button>
  </span>
</form>
